<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stats-Preview</title>
    <!-- Icon -->
    <link rel="icon" type="image/png" href="images/favicon-32x32.png" />
    <!-- CSS -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="card">
      <section class="left">
        <header class="header">
          <h1>Get <span>insights</span> that help your business grow.</h1>
        </header>
        <p class="main-text">
          Discover the benefits of data analytics and make better decisions
          regarding revenue, customer experience, and overall efficiency.
        </p>
        <div class="block">
          <div class="type companies">
            <h2 class="number">10k<span>+</span></h2>
            <p class="companies-text">companies</p>
          </div>
          <div class="type templates">
            <h2 class="number">314</h2>
            <p class="templates-text">templates</p>
          </div>
          <div class="type queries">
            <h2 class="number">12M<span>+</span></h2>
            <p class="queries-text">queries</p>
          </div>
        </div>
      </section>
      <section class="right"></section>
    </div>
  </body>
</html>
